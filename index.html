<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f2f6fc">
<title>우리 가족 위치</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="가족위치">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #f2f6fc;
    --surface: #ffffff;
    --text: #26334d;
    --text-dim: #8b9ab5;
    --accent: #3d7bfa;
    --accent-deep: #2f63d6;
    --accent-soft: #e5eeff;
    --border: #e3ebf7;
    --live: #10b981;
    --danger: #ef5350;
    --shadow: 0 2px 14px rgba(50, 90, 180, 0.10);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    padding: calc(12px + env(safe-area-inset-top)) 18px 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); z-index: 500; flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
  header h1 .pin { color: var(--accent); }
  #status {
    font-size: 12px; font-weight: 600; color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 999px; box-shadow: var(--shadow);
  }
  .hright { display: flex; align-items: center; gap: 8px; }
  #inviteBtn {
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface);
    box-shadow: var(--shadow); font-size: 15px;
  }
  #status .dot { width: 8px; height: 8px; border-radius: 50%; background: #c3cede; }
  #status.on { color: var(--live); }
  #status.on .dot { background: var(--live); box-shadow: 0 0 6px rgba(16,185,129,.6); }

  #mapWrap { flex: 1; min-height: 0; padding: 0 12px; }
  #map {
    height: 100%; border-radius: 20px; background: #dbe6f5;
    box-shadow: var(--shadow); border: 1px solid var(--border);
  }
  .leaflet-container { font: inherit; border-radius: 20px; }

  #panel {
    flex-shrink: 0; padding: 12px 12px calc(14px + env(safe-area-inset-bottom));
  }
  #members {
    display: flex; gap: 10px; margin-bottom: 12px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    padding: 2px;
  }
  #members::-webkit-scrollbar { display: none; }
  .member {
    flex: 0 0 auto; width: 92px; background: var(--surface);
    border-radius: 16px; padding: 12px 6px 10px;
    text-align: center; cursor: pointer; position: relative;
    border: 1.5px solid var(--border); box-shadow: var(--shadow);
    transition: transform 0.12s;
  }
  .member .delx {
    position: absolute; top: -7px; right: -7px; width: 24px; height: 24px;
    border-radius: 50%; border: 2px solid #fff; cursor: pointer;
    background: var(--danger); color: #fff; font-size: 12px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  .member:active { transform: scale(0.96); }
  .member.me { border-color: var(--accent); }
  .member .avatar {
    width: 40px; height: 40px; border-radius: 50%; margin: 0 auto 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: #fff;
    box-shadow: inset 0 -2px 4px rgba(0,0,0,.12);
  }
  .member .name {
    font-size: 13px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .member .seen { font-size: 11px; color: var(--text-dim); margin-top: 3px; font-weight: 600; }
  .member .seen.live { color: var(--live); }

  #shareBtn {
    width: 100%; padding: 16px; border: none; border-radius: 16px;
    font-size: 16px; font-weight: 800; cursor: pointer; color: #fff;
    background: linear-gradient(135deg, #4a86ff, var(--accent-deep));
    box-shadow: 0 6px 16px rgba(61, 123, 250, 0.35);
    transition: transform 0.12s;
  }
  #shareBtn:active { transform: scale(0.98); }
  #shareBtn.sharing {
    background: linear-gradient(135deg, #f36c6c, #d9453f);
    box-shadow: 0 6px 16px rgba(239, 83, 80, 0.3);
  }
  #shareBtn:disabled { background: #c9d4e8; box-shadow: none; color: #fff; }

  /* 최초 설정 화면 */
  .overlay {
    position: fixed; inset: 0; background: var(--bg); z-index: 2000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center; overflow-y: auto;
  }
  .overlay .card {
    width: 100%; max-width: 380px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 22px;
    box-shadow: var(--shadow); padding: 28px 22px;
  }
  .overlay .logo {
    width: 58px; height: 58px; border-radius: 18px; margin: 0 auto 14px;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 28px;
  }
  .overlay h2 { font-size: 20px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.3px; }
  .overlay p { font-size: 13.5px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.65; font-weight: 500; }
  .overlay input {
    width: 100%; padding: 14px; margin-bottom: 14px;
    border: 1.5px solid var(--border); border-radius: 13px; background: var(--bg);
    color: var(--text); font-size: 15px; text-align: center; font-weight: 600;
    outline: none; transition: border-color 0.15s;
  }
  .overlay input:focus { border-color: var(--accent); }
  .overlay input::placeholder { color: var(--text-dim); font-weight: 500; }
  .overlay .big {
    width: 100%; padding: 15px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, #4a86ff, var(--accent-deep));
    color: #fff; font-size: 15.5px; font-weight: 800; cursor: pointer;
    box-shadow: 0 6px 16px rgba(61, 123, 250, 0.35);
  }
  .overlay .big:disabled { background: #c9d4e8; box-shadow: none; }
  .overlay.hidden, .step.hidden, #setupOverlay.hidden { display: none; }

  #memberList {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    margin-bottom: 18px;
  }
  #memberList button {
    padding: 13px 18px; border: 1.5px solid var(--border); border-radius: 14px;
    background: var(--bg); color: var(--text); font-size: 15px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: border-color 0.15s;
  }
  #memberList button:active { border-color: var(--accent); }
  #memberList .dot { width: 14px; height: 14px; border-radius: 50%; }
  #memberList .empty { color: var(--text-dim); font-size: 13px; padding: 6px; font-weight: 500; }

  #presets { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; justify-content: center; }
  #presets button {
    padding: 8px 15px; border: 1.5px solid var(--border); border-radius: 999px;
    background: var(--surface); color: var(--text-dim); font-size: 13.5px; font-weight: 600; cursor: pointer;
  }
  #presets button:active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
  .addrow { display: flex; gap: 8px; }
  .addrow input { flex: 1; margin-bottom: 0; }
  .addrow button {
    flex: 0 0 auto; width: 52px; border: none; border-radius: 13px;
    background: var(--accent-soft); color: var(--accent); font-size: 24px; font-weight: 800; cursor: pointer;
  }
  .addrow button:active { background: var(--accent); color: #fff; }
  .divider { color: var(--text-dim); font-size: 12px; margin: 4px 0 14px; font-weight: 600; }

  #setupOverlay code {
    display: block; background: var(--accent-soft); border-radius: 10px; padding: 10px;
    font-size: 12px; color: var(--accent-deep); margin-top: 12px; word-break: break-all;
  }
  .marker-dot {
    width: 100%; height: 100%; border-radius: 50%;
    border: 3px solid #fff; box-shadow: 0 2px 8px rgba(30, 60, 120, .35);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #fff;
  }
</style>
</head>
<body>

<header>
  <h1><span class="pin">📍</span> 우리 가족 위치</h1>
  <div class="hright">
    <button id="inviteBtn" aria-label="가족 초대 링크 보내기">🔗</button>
    <div id="status"><span class="dot"></span><span id="statusText">공유 꺼짐</span></div>
  </div>
</header>

<div id="mapWrap"><div id="map"></div></div>

<div id="panel">
  <div id="members"></div>
  <button id="shareBtn">내 위치 공유 시작</button>
</div>

<div class="overlay hidden" id="whoOverlay">
  <!-- 1단계: 가족 코드 -->
  <div class="step" id="step1">
    <div class="card">
      <div class="logo">📍</div>
      <h2>우리 가족 위치</h2>
      <p>우리 가족만 아는 <b>가족 코드</b>를 입력하세요.<br>가족 모두 똑같은 코드를 써야 해요.</p>
      <input id="famInput" type="text" placeholder="가족 코드 (6자 이상)" autocomplete="off">
      <button class="big" id="nextBtn">다음</button>
    </div>
  </div>
  <!-- 2단계: 나는 누구? (기존 멤버 선택 또는 + 추가) -->
  <div class="step hidden" id="step2">
    <div class="card">
      <div class="logo">👋</div>
      <h2>누구세요?</h2>
      <p id="step2Hint">본인 이름을 선택하세요.<br>목록에 없으면 관리자(아빠)가 추가해 줘야 해요.</p>
      <div id="memberList"></div>
      <div class="divider">─ 새 가족 추가 (관리자) ─</div>
      <div id="presets"></div>
      <div class="addrow">
        <input id="newName" type="text" placeholder="이름 (예: 아들)" maxlength="10" autocomplete="off">
        <button id="addBtn">+</button>
      </div>
      <input id="adminPinInput" type="password" placeholder="관리자 코드" autocomplete="off" style="margin: 10px 0 0;">
    </div>
  </div>
</div>

<div class="overlay hidden" id="setupOverlay">
  <div class="card">
    <div class="logo">⚙️</div>
    <h2>초기 설정이 필요해요</h2>
    <p>Firebase 설정이 아직 입력되지 않았습니다.<br>README.md의 안내에 따라 index.html 안의<br><b>firebaseConfig</b>를 채워 주세요.</p>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQovL-c6q4RfuPKOnEiukw_aMzKBijqTE",
  authDomain: "family-location-a3573.firebaseapp.com",
  databaseURL: "https://family-location-a3573-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "family-location-a3573",
  storageBucket: "family-location-a3573.firebasestorage.app",
  messagingSenderId: "704140080979",
  appId: "1:704140080979:web:02728b1822e393c25493a6"
};

const PALETTE = ["#3d7bfa", "#ec6aa8", "#f0a422", "#10b981", "#8b5cf6", "#f97354", "#0ea5c8", "#e05656"];
const PRESETS = ["아빠", "엄마", "딸", "아들"];
// 예전 버전(고정 3인)에서 설정한 폰과의 호환용
const LEGACY = { dad: "아빠", mom: "엄마", daughter: "딸", son: "아들" };

const $ = (id) => document.getElementById(id);

if (firebaseConfig.apiKey === "REPLACE_ME") {
  $("setupOverlay").classList.remove("hidden");
  $("shareBtn").disabled = true;
  throw new Error("Firebase 설정 필요");
}

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let FAMILY_KEY = localStorage.getItem("family_key") || "";
let me = localStorage.getItem("family_me") || "";
// 초대 링크(?f=가족코드)로 들어온 경우 — 코드 입력 생략
const urlKey = (new URLSearchParams(location.search).get("f") || "").trim();

const membersRef = () => ref(db, `families/${FAMILY_KEY}/members`);
const memberRef = (id) => ref(db, `families/${FAMILY_KEY}/members/${id}`);
const locRef = (id) => ref(db, `families/${FAMILY_KEY}/locations/${id}`);
const adminPinRef = () => ref(db, `families/${FAMILY_KEY}/adminPin`);

async function sha256(s) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map((x) => x.toString(16).padStart(2, "0")).join("");
}

// ─────────────────────────────────────────────
// 최초 설정 화면 (가족 코드 → 멤버 선택/추가)
// ─────────────────────────────────────────────
function showSetup() {
  $("whoOverlay").classList.remove("hidden");
  $("shareBtn").disabled = true;
  $("famInput").value = FAMILY_KEY || urlKey;

  $("nextBtn").onclick = () => goStep2($("famInput").value.trim());
  // 초대 링크로 들어왔으면 코드 입력 화면을 건너뛰고 바로 이름 선택으로
  if (urlKey.length >= 6) goStep2(urlKey);
}

async function goStep2(key) {
  if (key.length < 6) { alert("가족 코드를 6자 이상으로 입력해 주세요."); return; }
  FAMILY_KEY = key;
  $("nextBtn").disabled = true;
  $("nextBtn").textContent = "확인 중…";
  let existing = {};
  let adminPinStored = null;
  try {
    const snap = await get(ref(db, `families/${FAMILY_KEY}`));
    const data = snap.val() || {};
    existing = data.members || {};
    adminPinStored = data.adminPin || null;
  } catch (e) {
    alert("연결에 실패했어요. 인터넷 상태를 확인해 주세요.");
    $("nextBtn").disabled = false;
    $("nextBtn").textContent = "다음";
    return;
  }
  renderStep2(existing, adminPinStored);
  $("step1").classList.add("hidden");
  $("step2").classList.remove("hidden");
}

function renderStep2(existing, adminPinStored) {
  const list = $("memberList");
  list.innerHTML = "";
  const entries = Object.entries(existing);
  if (entries.length === 0) {
    list.innerHTML = `<div class="empty">아직 등록된 가족이 없어요.<br>관리자(아빠)가 첫 번째로 등록해 주세요!</div>`;
    $("step2Hint").innerHTML = "새 가족을 만듭니다.<br>이름을 쓰고 <b>관리자 코드를 새로 만들어</b> 주세요.";
  }
  $("adminPinInput").placeholder = adminPinStored ? "관리자 코드" : "관리자 코드 만들기 (4자 이상)";
  for (const [id, m] of entries) {
    const b = document.createElement("button");
    b.innerHTML = `<span class="dot" style="background:${m.color}"></span>${m.name}`;
    b.onclick = () => finishSetup(id);
    list.appendChild(b);
  }

  const presets = $("presets");
  presets.innerHTML = "";
  const taken = new Set(entries.map(([, m]) => m.name));
  for (const name of PRESETS) {
    if (taken.has(name)) continue;
    const b = document.createElement("button");
    b.textContent = name;
    b.onclick = () => { $("newName").value = name; };
    presets.appendChild(b);
  }

  $("addBtn").onclick = async () => {
    const name = $("newName").value.trim();
    if (!name) { alert("이름을 입력해 주세요."); return; }
    if (taken.has(name)) { alert(`"${name}"은(는) 이미 있어요. 목록에서 선택해 주세요.`); return; }
    const pin = $("adminPinInput").value.trim();
    if (!adminPinStored) {
      // 첫 등록자 = 관리자. 관리자 코드를 새로 만든다
      if (pin.length < 4) { alert("관리자 코드를 4자 이상으로 만들어 주세요.\n앞으로 가족을 추가할 때 이 코드가 필요해요."); return; }
      await set(adminPinRef(), await sha256(pin));
      localStorage.setItem("family_admin", "1");
    } else {
      if (!pin) { alert("가족 추가는 관리자 코드가 필요해요.\n관리자(아빠)에게 문의하세요."); return; }
      if ((await sha256(pin)) !== adminPinStored) { alert("관리자 코드가 틀렸어요."); return; }
      localStorage.setItem("family_admin", "1");
    }
    const id = "m" + Date.now().toString(36);
    const color = PALETTE[entries.length % PALETTE.length];
    await set(memberRef(id), { name, color });
    finishSetup(id);
  };
}

function finishSetup(id) {
  localStorage.setItem("family_key", FAMILY_KEY);
  localStorage.setItem("family_me", id);
  location.reload();
}

// ─────────────────────────────────────────────
// 메인 앱
// ─────────────────────────────────────────────
function startApp() {
  // 주소에 가족 코드를 심어둠 — 이 상태로 홈 화면 추가/즐겨찾기 하면
  // 저장소가 초기화돼도 코드 입력 없이 이름 선택만 하면 됨
  if (urlKey !== FAMILY_KEY) {
    history.replaceState(null, "", `${location.pathname}?f=${encodeURIComponent(FAMILY_KEY)}`);
  }

  const map = L.map("map", { zoomControl: false }).setView([37.5665, 126.978], 12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19, attribution: "&copy; OpenStreetMap"
  }).addTo(map);

  let members = {};
  const markers = {};
  const latest = {};
  let didFit = false;
  let migrated = false;

  function markerFor(id) {
    const m = members[id];
    if (!m) return null;
    if (markers[id]) return markers[id];
    const icon = L.divIcon({
      className: "",
      html: `<div class="marker-dot" style="background:${m.color}">${m.name[0]}</div>`,
      iconSize: [34, 34], iconAnchor: [17, 17],
    });
    markers[id] = L.marker([0, 0], { icon }).addTo(map).bindPopup(m.name);
    return markers[id];
  }

  function timeAgo(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 90) return { text: "방금 전", live: true };
    if (s < 3600) return { text: `${Math.floor(s / 60)}분 전`, live: s < 300 };
    if (s < 86400) return { text: `${Math.floor(s / 3600)}시간 전`, live: false };
    return { text: new Date(ts).toLocaleDateString("ko-KR", { month: "short", day: "numeric" }), live: false };
  }

  function renderMembers() {
    const wrap = $("members");
    wrap.innerHTML = "";
    const ids = Object.keys(members).sort((a, b) => (a === me ? -1 : b === me ? 1 : 0));
    for (const id of ids) {
      const m = members[id];
      const el = document.createElement("div");
      el.className = "member" + (id === me ? " me" : "");
      el.innerHTML = `
        <div class="avatar" style="background:${m.color}">${m.name[0]}</div>
        <div class="name">${m.name}${id === me ? " (나)" : ""}</div>
        <div class="seen" id="seen-${id}">위치 없음</div>`;
      el.onclick = () => {
        const p = latest[id];
        if (p) { map.setView([p.lat, p.lng], 16); markers[id]?.openPopup(); }
      };
      // 관리자 폰에는 삭제(✕) 배지 표시
      if (localStorage.getItem("family_admin") === "1") {
        const del = document.createElement("button");
        del.className = "delx";
        del.textContent = "✕";
        del.onclick = async (ev) => {
          ev.stopPropagation();
          if (!confirm(`"${m.name}"을(를) 가족에서 삭제할까요?\n위치 기록도 함께 지워져요.`)) return;
          await set(memberRef(id), null);
          await set(locRef(id), null);
          if (id === me) {
            // 나 자신을 삭제한 경우 → 처음 설정 화면으로
            localStorage.removeItem("family_me");
            location.reload();
          }
        };
        el.appendChild(del);
      }
      wrap.appendChild(el);
    }
    // 관리자용 가족 추가 카드
    const addCard = document.createElement("div");
    addCard.className = "member";
    addCard.innerHTML = `
      <div class="avatar" style="background:var(--accent-soft);color:var(--accent);box-shadow:none">＋</div>
      <div class="name">추가</div>
      <div class="seen">관리자</div>`;
    addCard.onclick = adminAddMember;
    wrap.appendChild(addCard);
    renderSeen();
  }

  // 가족 추가는 관리자 코드를 아는 사람만 가능
  async function adminAddMember() {
    const pinSnap = await get(adminPinRef());
    const stored = pinSnap.val();
    if (!stored) {
      const pin = prompt("관리자 코드가 아직 없어요.\n새 관리자 코드를 만들어 주세요 (4자 이상).\n앞으로 가족을 추가할 때 이 코드가 필요해요.");
      if (!pin || pin.trim().length < 4) return;
      await set(adminPinRef(), await sha256(pin.trim()));
      localStorage.setItem("family_admin", "1");
    } else if (localStorage.getItem("family_admin") !== "1") {
      const pin = prompt("관리자 코드를 입력하세요");
      if (!pin) return;
      if ((await sha256(pin.trim())) !== stored) { alert("관리자 코드가 틀렸어요."); return; }
      localStorage.setItem("family_admin", "1");
      renderMembers(); // 관리자 인증됨 → 삭제(✕) 배지 표시
    }
    const name = prompt("추가할 가족 이름 (예: 아들)");
    if (!name || !name.trim()) return;
    const nm = name.trim();
    if (Object.values(members).some((m) => m.name === nm)) { alert("이미 있는 이름이에요."); return; }
    const id = "m" + Date.now().toString(36);
    const color = PALETTE[Object.keys(members).length % PALETTE.length];
    await set(memberRef(id), { name: nm, color });
    alert(`"${nm}" 등록 완료!\n${nm}의 폰에서 초대 링크(🔗)로 접속해 이름만 선택하면 돼요.`);
  }

  function renderSeen() {
    for (const id of Object.keys(members)) {
      const el = $(`seen-${id}`);
      if (!el) continue;
      const p = latest[id];
      if (!p) { el.textContent = "위치 없음"; el.className = "seen"; continue; }
      const t = timeAgo(p.ts);
      el.textContent = t.text;
      el.className = "seen" + (t.live ? " live" : "");
    }
  }
  setInterval(renderSeen, 30000);

  function updateMarkers() {
    for (const [id, p] of Object.entries(latest)) {
      const mk = markerFor(id);
      if (mk) mk.setLatLng([p.lat, p.lng]);
    }
    const pts = Object.values(latest).map((p) => [p.lat, p.lng]);
    if (!didFit && pts.length) {
      map.fitBounds(L.latLngBounds(pts).pad(0.3), { maxZoom: 15 });
      didFit = true;
    }
  }

  // 멤버 목록 실시간 수신 — 누가 새로 추가되면 모든 폰에 바로 반영
  onValue(membersRef(), (snap) => {
    members = snap.val() || {};
    // 예전 버전(dad/mom/daughter 고정)으로 설정된 폰이면 멤버 명단에 자동 등록
    if (!members[me] && LEGACY[me] && !migrated) {
      migrated = true;
      const color = PALETTE[Object.keys(members).length % PALETTE.length];
      set(memberRef(me), { name: LEGACY[me], color });
      return;
    }
    // 각 멤버의 마커 다시 만들기 (이름/색 변경 대비)
    for (const id of Object.keys(markers)) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }
    renderMembers();
    updateMarkers();
  });

  // 위치 실시간 수신
  onValue(ref(db, `families/${FAMILY_KEY}/locations`), (snap) => {
    const data = snap.val() || {};
    // 삭제된 멤버의 위치는 지도에서도 제거
    for (const id of Object.keys(latest)) {
      if (!data[id]) {
        delete latest[id];
        if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
      }
    }
    for (const [id, p] of Object.entries(data)) {
      if (!p?.lat) continue;
      latest[id] = p;
    }
    updateMarkers();
    renderSeen();
  });

  // ── 내 위치 공유 ──
  let watchId = null;
  let lastSent = 0;
  let wakeLock = null;
  const btn = $("shareBtn");

  async function startShare() {
    if (!navigator.geolocation) { alert("이 기기는 위치 기능을 지원하지 않아요."); return; }
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        const now = Date.now();
        if (now - lastSent < 8000) return; // 8초에 한 번만 전송
        lastSent = now;
        set(locRef(me), {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          acc: Math.round(pos.coords.accuracy),
          ts: now,
        });
      },
      (err) => {
        stopShare();
        alert("위치 권한을 허용해야 공유할 수 있어요.\n(" + err.message + ")");
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 20000 }
    );
    try { wakeLock = await navigator.wakeLock?.request("screen"); } catch {}
    btn.textContent = "공유 중지";
    btn.classList.add("sharing");
    $("status").classList.add("on");
    $("statusText").textContent = "내 위치 공유 중";
  }

  function stopShare() {
    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
    watchId = null;
    wakeLock?.release(); wakeLock = null;
    btn.textContent = "내 위치 공유 시작";
    btn.classList.remove("sharing");
    $("status").classList.remove("on");
    $("statusText").textContent = "공유 꺼짐";
  }

  btn.onclick = () => (watchId === null ? startShare() : stopShare());

  // 초대 링크 보내기 — 링크에 가족 코드가 담겨 상대는 이름만 선택하면 됨
  $("inviteBtn").onclick = async () => {
    const url = `${location.origin}${location.pathname}?f=${encodeURIComponent(FAMILY_KEY)}`;
    if (navigator.share) {
      try { await navigator.share({ title: "우리 가족 위치", text: "우리 가족 위치 앱에 들어와요!", url }); } catch {}
    } else {
      try {
        await navigator.clipboard.writeText(url);
        alert("초대 링크가 복사됐어요. 가족에게 카톡 등으로 보내주세요!");
      } catch {
        prompt("아래 링크를 복사해서 가족에게 보내주세요:", url);
      }
    }
  };

  document.addEventListener("visibilitychange", async () => {
    if (document.visibilityState === "visible" && watchId !== null) {
      try { wakeLock = await navigator.wakeLock?.request("screen"); } catch {}
    }
  });
}

if (!FAMILY_KEY || !me) {
  showSetup();
} else {
  startApp();
}
</script>
</body>
</html>
